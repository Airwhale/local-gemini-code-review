name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        # ubuntu for speed; windows because the runner special-cases
        # Windows encodings (cp1252 mojibake, UTF-8 stdout reconfigure).
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Run tests
        run: uv run --group dev pytest tests/ -v

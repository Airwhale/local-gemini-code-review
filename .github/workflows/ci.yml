name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Ruff lint
        run: uv run --group dev ruff check code_review tests evals review.py
      - name: Ruff format check
        run: uv run --group dev ruff format --check code_review tests evals review.py
      - name: Mypy
        run: uv run --group dev mypy

  test:
    strategy:
      matrix:
        # ubuntu for speed; windows because the runner special-cases
        # Windows encodings (cp1252 mojibake, UTF-8 stdout reconfigure).
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Run tests
        run: uv run --group dev pytest tests/ -v
      - name: Build wheel and verify prompt assets ship inside it
        run: |
          uv build
          uv run python -c "import glob, sys, zipfile; names = zipfile.ZipFile(glob.glob('dist/*.whl')[0]).namelist(); skills = [n for n in names if 'code_review/skills/' in n]; commands = [n for n in names if 'code_review/commands/' in n]; print(f'{len(skills)} skill files, {len(commands)} command files in wheel'); sys.exit(0 if skills and commands else 1)"
